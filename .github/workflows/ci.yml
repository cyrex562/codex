name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel redundant runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Gate 1: Rust lint ───────────────────────────────────────────────────────
  lint:
    name: Lint (rustfmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Gate 2: Rust tests ─────────────────────────────────────────────────────
  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libsqlite3-dev pkg-config libssl-dev
      - name: Run all Rust tests
        run: cargo test --workspace
        env:
          RUST_LOG: debug

  # ── Gate 3: Frontend unit tests (Vitest) ───────────────────────────────────
  vitest:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  # ── Gate 4: Playwright E2E — chromium + firefox + webkit ───────────────────
  e2e:
    name: Playwright E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [rust-test, vitest]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libsqlite3-dev pkg-config libssl-dev
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Build server
        working-directory: .
        run: cargo build -p codex-server
      - name: Start codex-server in background
        working-directory: .
        run: |
          mkdir -p /tmp/codex-e2e
          cat > /tmp/codex-e2e/config.toml <<'EOF'
          [server]
          host = "127.0.0.1"
          port = 4173

          [database]
          path = "/tmp/codex-e2e/codex.db"
          EOF
          ./target/debug/codex-server --config /tmp/codex-e2e/config.toml &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for the health endpoint to come up (max 30s).
          for i in $(seq 1 300); do
            if curl -sf http://127.0.0.1:4173/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i} attempts"
              break
            fi
            sleep 0.1
          done
      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: frontend/playwright-report/
          retention-days: 7

  # ── WebKitGTK 2.36 compatibility gate ──────────────────────────────────────
  webkit-compat:
    name: WebKitGTK 2.36 compat (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    needs: [rust-test, vitest]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies (Ubuntu 22.04)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libsqlite3-dev pkg-config libssl-dev \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Playwright webkit browser
        run: npx playwright install --with-deps webkit
      - name: Build frontend
        run: npm run build
      - name: Build server
        working-directory: .
        run: cargo build -p codex-server
      - name: Start codex-server in background
        working-directory: .
        run: |
          mkdir -p /tmp/codex-e2e
          cat > /tmp/codex-e2e/config.toml <<'EOF'
          [server]
          host = "127.0.0.1"
          port = 4173

          [database]
          path = "/tmp/codex-e2e/codex.db"
          EOF
          ./target/debug/codex-server --config /tmp/codex-e2e/config.toml &
          for i in $(seq 1 300); do
            if curl -sf http://127.0.0.1:4173/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i} attempts"
              break
            fi
            sleep 0.1
          done
      - name: Run Playwright tests on webkit (WebKitGTK 2.36 baseline)
        run: npx playwright test --project=webkit
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-webkit-gtk-2.36
          path: frontend/playwright-report/
          retention-days: 14
